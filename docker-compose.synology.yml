# Synology DS1515+ deployment.
#
# The API image is built by CI (.github/workflows/publish-ghcr.yml) and pulled
# from GHCR — nothing is compiled on the NAS. Place this file plus nginx.conf in
# a folder on the NAS (e.g. /volume1/docker/flugbuech/) and create a Container
# Manager Project pointing at it.
#
# Before first run:
#   1. mkdir the DB bind dir: /volume1/docker/flugbuech/db
#   2. If the GHCR package is private: Container Manager > Registry > Settings,
#      add ghcr.io with your GitHub username + a PAT scoped `read:packages`.
services:
  db:
    image: postgis/postgis:17-3.5
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "flugbuech"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: flugbuech
      POSTGRES_USER: flugbuech
      POSTGRES_HOST_AUTH_METHOD: trust
    # Persist database data outside the container so it survives recreates /
    # image updates. Visible in File Station and backed up by Hyper Backup.
    volumes:
      - /volume1/docker/flugbuech/db:/var/lib/postgresql/data

  api:
    # Prebuilt image from CI — pulled, not compiled on the NAS.
    image: ghcr.io/claudio-chies/flugbuech:latest
    restart: always
    ports:
      - "8000"
    links:
      - db
    depends_on:
      db:
        condition: service_healthy
        restart: true
    volumes:
      - frontend-static:/static
    environment:
      ROCKET_PROFILE: release
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: 8000
      ROCKET_LOG_LEVEL: normal
      # Read from a gitignored .env file in this folder (see .env.example).
      # Generate with `openssl rand -base64 32`. Never commit the real value.
      ROCKET_SECRET_KEY: "${ROCKET_SECRET_KEY:?set ROCKET_SECRET_KEY in .env}"
      DATABASE_URL: postgres://flugbuech@db/flugbuech
      ROCKET_DATABASES: '{flugbuech={url="postgres://flugbuech@db/flugbuech"}}'
      # Optional self-hosted, GDPR compliant, non-privacy-invading visitor stats
      #PLAUSIBLE_DOMAIN: example.com
      #PLAUSIBLE_URL: https://example.com/plausible.js

  web:
    image: docker.io/nginx:1.29
    restart: always
    # Host port 9080 avoids DSM's 80/443/5000/5001. Front with DSM's reverse
    # proxy for HTTPS.
    ports:
      - "9080:80"
    links:
      - "api:api"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-static:/flugbuech/static:ro

volumes:
  frontend-static:
